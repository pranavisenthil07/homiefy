<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homiefy — Find your vibe, find your tribe</title>
<style>
  :root {
    --purple: #7F77DD;
    --purple-dark: #534AB7;
    --purple-light: #EEEDFE;
    --purple-text: #3C3489;
    --green-light: #EAF3DE;
    --green-text: #3B6D11;
    --green-mid: #1D9E75;
    --amber-light: #FAEEDA;
    --amber-text: #854F0B;
    --red-light: #FCEBEB;
    --red-text: #A32D2D;
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efe9;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #9a9a9a;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
  a { color: var(--purple); text-decoration: none; }

  /* NAV */
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-size: 22px; font-weight: 600; color: var(--text); cursor: pointer; }
  .nav-logo span { color: var(--purple); }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .notif-wrap { position: relative; display: inline-block; }
  .notif-dot { width: 8px; height: 8px; background: #E24B4A; border-radius: 50%; position: absolute; top: 2px; right: 2px; display: none; }

  /* BUTTONS */
  .btn { padding: 8px 18px; border-radius: var(--radius); font-size: 14px; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--text); font-family: inherit; transition: all 0.15s; font-weight: 500; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn-primary:hover { background: var(--purple-dark); border-color: var(--purple-dark); }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-danger { border-color: #E24B4A; color: var(--red-text); }
  .btn-danger:hover { background: var(--red-light); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero { padding: 5rem 2rem 4rem; text-align: center; max-width: 700px; margin: 0 auto; }
  .hero-badge { display: inline-block; background: var(--purple-light); color: var(--purple-dark); font-size: 13px; padding: 5px 16px; border-radius: 99px; margin-bottom: 1.5rem; font-weight: 500; }
  .hero h1 { font-size: 52px; font-weight: 700; line-height: 1.1; color: var(--text); margin-bottom: 1.2rem; letter-spacing: -1px; }
  .hero h1 span { color: var(--purple); display: inline; }
  .hero p { font-size: 18px; color: var(--text2); line-height: 1.7; margin-bottom: 2rem; }
  .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* FEATURES */
  .section { padding: 4rem 2rem; max-width: 940px; margin: 0 auto; }
  .section-tag { font-size: 12px; font-weight: 600; color: var(--purple); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .section-title { font-size: 30px; font-weight: 700; color: var(--text); margin-bottom: 2.5rem; }
  .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .feature-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
  .f-icon { width: 40px; height: 40px; background: var(--purple-light); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
  .f-icon svg { width: 20px; height: 20px; stroke: var(--purple); fill: none; stroke-width: 2; }
  .feature-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .feature-card p { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* HOW */
  .how-section { background: var(--bg2); padding: 4rem 2rem; }
  .how-inner { max-width: 680px; margin: 0 auto; }
  .steps { margin-top: 2rem; }
  .step { display: flex; gap: 16px; padding: 1.2rem 0; border-bottom: 0.5px solid var(--border); }
  .step:last-child { border-bottom: none; }
  .step-n { width: 32px; height: 32px; border-radius: 50%; background: var(--purple); color: #fff; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .step h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .step p { font-size: 13px; color: var(--text2); margin: 0; line-height: 1.6; }

  /* FORM */
  .form-page { max-width: 580px; margin: 3rem auto; padding: 0 1.5rem 5rem; }
  .form-header h2 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .form-header p { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .progress-wrap { height: 4px; background: var(--bg3); border-radius: 99px; margin-bottom: 8px; }
  .progress-fill { height: 100%; background: var(--purple); border-radius: 99px; transition: width 0.3s; }
  .step-label { font-size: 12px; color: var(--text3); margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.25rem; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2);
    background: var(--bg); font-size: 14px; color: var(--text); font-family: inherit; transition: border 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--purple); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 16px; border-radius: 99px; border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; color: var(--text); background: var(--bg); transition: all 0.15s; user-select: none; font-weight: 500; }
  .chip:hover { border-color: var(--purple); color: var(--purple); }
  .chip.sel { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
  .form-nav { display: flex; justify-content: space-between; margin-top: 2rem; }

  /* MATCHES */
  .matches-page { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .page-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .fchip { padding: 6px 16px; border-radius: 99px; border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; color: var(--text2); background: transparent; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .fchip.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
  .match-cards { display: flex; flex-direction: column; gap: 14px; }
  .match-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; transition: border 0.2s; }
  .match-card.mutual { border-color: var(--purple); border-width: 1.5px; }
  .match-top { display: flex; gap: 14px; align-items: flex-start; }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
  .match-info { flex: 1; min-width: 0; }
  .match-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .match-meta { font-size: 13px; color: var(--text2); margin: 3px 0 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 99px; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }
  .match-right { text-align: right; flex-shrink: 0; }
  .score-big { font-size: 22px; font-weight: 700; color: var(--purple); }
  .score-lbl { font-size: 11px; color: var(--text3); }
  .score-bar { width: 60px; height: 4px; background: var(--bg3); border-radius: 99px; margin: 6px 0 0 auto; }
  .score-fill2 { height: 100%; background: var(--purple); border-radius: 99px; }
  .mutual-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--green-light); color: var(--green-text); margin-top: 5px; font-weight: 500; }
  .pending-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--amber-light); color: var(--amber-text); margin-top: 5px; font-weight: 500; }
  .match-note { font-size: 13px; color: var(--text2); margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); font-style: italic; }
  .match-sunday { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .match-sunday strong { color: var(--text); font-style: normal; }
  .match-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
  .connect-btn { padding: 8px 18px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; background: var(--purple); color: #fff; border: none; transition: background 0.15s; }
  .connect-btn:hover { background: var(--purple-dark); }
  .connect-btn:disabled { background: var(--bg2); color: var(--text3); cursor: default; }
  .pass-btn { padding: 8px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-family: inherit; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); transition: background 0.15s; }
  .pass-btn:hover { background: var(--bg2); }
  .contact-box { background: var(--green-light); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--green-text); margin-top: 12px; font-weight: 500; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }

  /* REQUESTS */
  .req-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 12px; display: flex; gap: 14px; align-items: center; }
  .req-info { flex: 1; }
  .req-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .req-meta { font-size: 13px; color: var(--text2); }
  .req-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .accept-btn { padding: 7px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-family: inherit; background: var(--purple); color: #fff; border: none; font-weight: 500; transition: background 0.15s; }
  .accept-btn:hover { background: var(--purple-dark); }
  .reject-btn { padding: 7px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-family: inherit; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); }

  /* ADMIN */
  .admin-layout { display: flex; min-height: calc(100vh - 65px); }
  .sidebar { width: 210px; flex-shrink: 0; border-right: 0.5px solid var(--border); padding: 1rem 0; background: var(--bg); }
  .sidebar-section { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 0.75rem 1.25rem 0.3rem; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 1.25rem; font-size: 13px; cursor: pointer; color: var(--text2); border-left: 2px solid transparent; transition: all 0.15s; font-weight: 500; }
  .nav-item:hover { background: var(--bg2); color: var(--text); }
  .nav-item.active { color: var(--purple); background: var(--purple-light); border-left-color: var(--purple); }
  .nav-item svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }
  .badge-c { margin-left: auto; font-size: 11px; background: var(--purple); color: #fff; border-radius: 99px; padding: 1px 8px; }
  .admin-main { flex: 1; padding: 1.75rem; background: var(--bg2); overflow: hidden; }
  .admin-panel { display: none; }
  .admin-panel.active { display: block; }
  .admin-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .admin-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg); border-radius: var(--radius); padding: 1rem; border: 0.5px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-delta { font-size: 11px; color: var(--green-text); margin-top: 3px; font-weight: 500; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; color: var(--text2); font-weight: 600; padding: 8px 10px; border-bottom: 0.5px solid var(--border); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 10px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }
  .sbadge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .s-matched { background: var(--green-light); color: var(--green-text); }
  .s-pending { background: var(--amber-light); color: var(--amber-text); }
  .s-mutual { background: var(--purple-light); color: var(--purple-text); }
  .s-new { background: var(--bg2); color: var(--text2); }
  .avatar-sm { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; vertical-align: middle; margin-right: 8px; }
  .search-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-row input, .search-row select { padding: 7px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); font-size: 13px; color: var(--text); font-family: inherit; }
  .search-row input { flex: 1; min-width: 140px; }
  .run-box { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; background: var(--bg); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .run-info h4 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .run-info p { font-size: 13px; color: var(--text2); margin: 0; }
  .threshold-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .threshold-row label { font-size: 12px; color: var(--text2); }
  .threshold-val { font-size: 13px; font-weight: 600; color: var(--purple); min-width: 36px; }
  .progress-bar2 { height: 4px; background: var(--bg3); border-radius: 99px; margin: 10px 0 6px; }
  .progress-fill2 { height: 100%; background: var(--purple); border-radius: 99px; transition: width 0.5s; }
  .match-pair { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .match-pair:last-child { border-bottom: none; }
  .pair-names { flex: 1; font-size: 13px; color: var(--text); font-weight: 500; }
  .pair-score { font-size: 13px; font-weight: 700; color: var(--purple); width: 44px; text-align: right; }
  .pair-bar-wrap { width: 64px; height: 4px; background: var(--bg3); border-radius: 99px; }
  .pair-bar { height: 100%; border-radius: 99px; background: var(--purple); }
  .log-item { font-size: 12px; padding: 6px 0; border-bottom: 0.5px solid var(--border); display: flex; gap: 10px; align-items: center; }
  .log-item:last-child { border-bottom: none; }
  .log-time { color: var(--text3); flex-shrink: 0; width: 80px; }
  .log-msg { color: var(--text); flex: 1; }
  .log-type { font-size: 10px; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; font-weight: 500; }
  .log-match { background: var(--green-light); color: var(--green-text); }
  .log-user { background: var(--purple-light); color: var(--purple-text); }
  .log-system { background: var(--bg2); color: var(--text2); }


  .auth-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; background: rgba(255,255,255,0.97); position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 3rem 2.5rem; max-width: 400px; width: 100%; text-align: center; }
  .auth-logo { font-size: 32px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .auth-logo span { color: var(--purple); }
  .auth-tagline { font-size: 15px; color: var(--text2); margin-bottom: 2rem; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px 20px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s; color: var(--text); }
  .google-btn:hover { background: var(--bg2); }
  .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .auth-note { font-size: 12px; color: var(--text3); margin-top: 1.5rem; line-height: 1.6; }
  .user-pill { display: flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border2); font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text); font-family: inherit; }
  .user-pill-av { width: 24px; height: 24px; border-radius: 50%; background: var(--purple-light); color: var(--purple); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }


  /* RATING PAGE */
  .rating-page { max-width: 480px; margin: 3rem auto; padding: 0 1.5rem 5rem; text-align: center; }
  .rating-page h2 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .rating-page p { font-size: 14px; color: var(--text2); margin-bottom: 2rem; }
  .stars-wrap { display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem; }
  .star { width: 48px; height: 48px; cursor: pointer; transition: transform 0.15s; }
  .star:hover { transform: scale(1.2); }
  .star svg { width: 100%; height: 100%; }
  .rating-questions { display: flex; flex-direction: column; gap: 14px; margin-bottom: 2rem; text-align: left; }
  .rating-q { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .rating-q label { font-size: 14px; font-weight: 500; color: var(--text); display: block; margin-bottom: 10px; }
  .rating-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .rating-chip { padding: 6px 14px; border-radius: 99px; border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; color: var(--text2); background: transparent; font-family: inherit; transition: all 0.15s; }
  .rating-chip.sel { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); font-weight: 500; }
  .rating-textarea { width: 100%; padding: 10px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); font-size: 14px; color: var(--text); font-family: inherit; resize: vertical; min-height: 80px; margin-top: 6px; }
  .notice-text { flex: 1; }
  .notice-text strong { font-size: 14px; font-weight: 600; color: var(--purple-dark); display: block; }
  .notice-text span { font-size: 13px; color: var(--purple-text); }
  .notice-amount { font-size: 22px; font-weight: 700; color: var(--purple); flex-shrink: 0; }

  /* TOAST */
  .toast-wrap { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; }
  .toast { background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: var(--radius); font-size: 14px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; font-weight: 500; }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .hero h1 { font-size: 28px; letter-spacing: -0.5px; line-height: 1.2; }
    .hero p { font-size: 15px; }
    .hero { padding: 3rem 1.5rem 2.5rem; }
    .hero-badge { font-size: 12px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .nav { padding: 1rem; }
    .admin-layout { flex-direction: column; }

    .nav-item { padding: 7px 10px; border-left: none; border-bottom: 2px solid transparent; font-size: 12px; }
    .nav-item.active { border-left: none; border-bottom-color: var(--purple); background: transparent; }
  }
</style>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    if (!currentUser || !currentProfile) return;

      const allProfiles = [];
      snap.forEach(doc => {

      const mySharing = currentProfile.sharing || '2';
      const sharingNum = parseInt(mySharing) || 2;
      const groupSize = sharingNum; // e.g. 3-sharing = group of 3 people total

      // Step 1: Filter by same sharing type
      const sameSharing = allProfiles.filter(p =>
        !p.sharing || p.sharing === mySharing ||
        Math.abs((parseInt(p.sharing)||2) - sharingNum) <= 1
      );

      // Step 2: Score all filtered profiles
      const scored = sameSharing
        .map(p => ({ ...p, score: computeScore(currentProfile, p) }))
        .filter(p => p.score >= 60)
        .sort((a, b) => b.score - a.score);

      // Step 3: Group them based on sharing type
      const groups = buildGroups(scored, sharingNum);

      window._liveMatches = scored;
      renderGroupMatches(groups, sharingNum);

  // Build groups of (sharingNum - 1) people for the current user
  function buildGroups(scored, sharingNum) {
    const needed = sharingNum - 1; // people needed besides current user
    if(needed <= 1 || scored.length === 0) {
      // 2-sharing = just pairs, return as single-person cards
      return scored.map(p => ({ members: [p], groupScore: p.score }));
    }
    // For 3+ sharing: find best groups
    const groups = [];
    const used = new Set();
    for(let i = 0; i < scored.length; i++) {
      if(used.has(scored[i].id)) continue;
      const group = [scored[i]];
      // Find best compatible partners for this group
      for(let j = i+1; j < scored.length && group.length < needed; j++) {
        if(used.has(scored[j].id)) continue;
        // Check member-to-member compatibility
        const memberScore = computeScore(scored[i], scored[j]);
        if(memberScore >= 55) {
          group.push(scored[j]);
        }
      }
      if(group.length === needed) {
        const avgScore = Math.round(group.reduce((s,p) => s+p.score, 0) / group.length);
        groups.push({ members: group, groupScore: avgScore });
        group.forEach(p => used.add(p.id));
      }
    }
    // Add ungrouped as solo cards
    scored.forEach(p => {
      if(!used.has(p.id)) groups.push({ members: [p], groupScore: p.score });
    });
    return groups.sort((a,b) => b.groupScore - a.groupScore);
  }

  // ── SCORING ENGINE ──
  function computeScore(a, b) {
    let score = 0;
    const budgetTiers = ['10k','15k','20k','30k','30k+'];
    const cleanTiers = ['ocd','very','normal','messy'];

    function tierScore(va, vb, tiers) {
      const ai = tiers.indexOf(va), bi = tiers.indexOf(vb);
      if(ai===-1||bi===-1) return 0.5;
      const d = Math.abs(ai-bi);
      return d===0?1:d===1?0.6:0;
    }
    function habitScore(va, vb) {
      if(va===vb) return 1;
      if((va==='yes'&&vb==='ok')||(vb==='yes'&&va==='ok')) return 1;
      return 0;
    }
    function persScore(va, vb) {
      if(va===vb) return 1;
      if(va==='ambivert'||vb==='ambivert') return 0.8;
      return 0.3;
    }

    score += tierScore(a.budget, b.budget, budgetTiers) * 25;
    score += tierScore(a.cleanliness, b.cleanliness, cleanTiers) * 20;
    score += habitScore(a.smoking, b.smoking) * 15;
    score += habitScore(a.alcohol, b.alcohol) * 10;
    score += (a.sleep===b.sleep||a.sleep==='flex'||b.sleep==='flex'?1:0) * 15;
    score += persScore(a.personality, b.personality) * 8;
    score += (a.parties===b.parties?1:0.2) * 5;
    // Sharing type scoring
    if(a.sharing && b.sharing) {
      score += (a.sharing===b.sharing ? 1 : Math.abs(parseInt(a.sharing)||2 - parseInt(b.sharing)||2) <= 1 ? 0.5 : 0) * 7;
    }
    return Math.round(score);
  }

      profilePic: window._profilePicData || '',
    };
    if (!profileData.name) { showToast('Please enter your name!'); return; }
    saveProfile(profileData); setTimeout(generateUPIQR, 100);
  }
}
function formBack() {
  if(fStep > 1) {
    document.getElementById('fstep-'+fStep).style.display = 'none';
    fStep--;
    document.getElementById('fstep-'+fStep).style.display = 'block';
    document.getElementById('btn-back').style.visibility = fStep===1 ? 'hidden' : 'visible';
    document.getElementById('btn-next').textContent = 'Next';
    document.getElementById('f-progress').style.width = (fStep/fTotal*100)+'%';
    document.getElementById('f-step-label').textContent = `Step ${fStep} of ${fTotal} — ${fLabels[fStep-1]}`;
  }
}
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', function() {
    this.closest('.chip-group').querySelectorAll('.chip').forEach(x => x.classList.remove('sel'));
    this.classList.add('sel');
  });
});

// ── MATCHES ──
function filterMatches(filter, btn) {
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderMatches(filter);
}

function renderMatches(filter) {
  const filtered = profiles.filter(p => {
    const s = cardStates[p.id];
    if(filter==='all') return true;
    if(filter==='new') return s==='new';
    if(filter==='connected') return s==='connected';
    if(filter==='mutual') return s==='mutual';
    return true;
  });
  const c = document.getElementById('match-cards');
  if(!filtered.length) { c.innerHTML='<div class="empty-state">No matches in this filter yet.</div>'; return; }
  c.innerHTML = filtered.map((p,i) => {
    const s = cardStates[p.id];
    const bg = avatarBg[i%6], tc = avatarText[i%6];
    const init = p.name.split(' ').map(x=>x[0]).join('');
    let actions = '';
    if(s==='mutual') {
      actions = `<div class="contact-box">
        <div style="font-weight:600;margin-bottom:8px">Mutual match! Contact details unlocked</div>
        ${p.phone ? `<div style="margin-bottom:4px">Phone: <strong>${p.phone}</strong></div>` : ''}
        ${p.email ? `<div style="margin-bottom:4px">Email: <strong>${p.email}</strong></div>` : ''}
      </div>`;
    } else if(s==='connected') {
      actions = `<div class="match-actions"><button class="connect-btn" disabled>Request sent</button><span class="pending-badge">Waiting for them</span></div>`;
    } else {
      actions = `<div class="match-actions">
        <button class="connect-btn" onclick="sendConnect(${p.id})">Send connect request</button>
        <button class="pass-btn" onclick="passCard(${p.id})">Not interested</button>
      </div>`;
    }
    return `<div class="match-card ${s==='mutual'?'mutual':''}" id="mc-${p.id}">
      <div class="match-top">
        <div class="avatar" style="width:48px;height:48px;background:${bg};color:${tc};font-size:16px">${init}</div>
        <div class="match-info">
          <div class="match-name">${p.name}</div>
          <div class="match-meta">${p.city} · ${p.budget} · ${p.personality}</div>
          <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="match-right">
          <div class="score-big">${p.score}%</div>
          <div class="score-lbl">match</div>
          <div class="score-bar"><div class="score-fill2" style="width:${p.score}%"></div></div>
          ${s==='mutual'?'<div class="mutual-badge">Mutual</div>':''}
        </div>
      </div>
      <div class="match-note">"${p.note}"</div>
      <div class="match-sunday"><strong>Ideal Sunday:</strong> ${p.sunday}</div>
      ${actions}
    </div>`;
  }).join('');
}

function sendConnect(id) {
  cardStates[id] = 'connected';
  renderMatches(document.querySelector('.fchip.active').textContent.toLowerCase().trim());
  showToast('Connect request sent!');
}
function passCard(id) {
  const idx = profiles.findIndex(p=>p.id===id);
  if(idx>-1) profiles.splice(idx,1);
  renderMatches(document.querySelector('.fchip.active').textContent.toLowerCase().trim());
  showToast('Profile hidden.');
}

// ── REQUESTS ──
function renderRequests() {
  const pending = requests.filter(r=>r.status==='pending');
  const c = document.getElementById('req-list');
  if(!pending.length) { c.innerHTML='<div class="empty-state">No pending requests right now.</div>'; return; }
  c.innerHTML = pending.map((r,i)=>{
    const bg=avatarBg[i%6],tc=avatarText[i%6];
    const init=r.name.split(' ').map(x=>x[0]).join('');
    return `<div class="req-card" id="rc-${r.id}">
      <div class="avatar" style="width:44px;height:44px;background:${bg};color:${tc};font-size:14px">${init}</div>
      <div class="req-info"><div class="req-name">${r.name}</div><div class="req-meta">${r.city} · ${r.budget} · ${r.score}% match</div></div>
      <div class="req-actions">
        <button class="accept-btn" onclick="acceptReq(${r.id})">Accept</button>
        <button class="reject-btn" onclick="rejectReq(${r.id})">Decline</button>
      </div>
    </div>`;
  }).join('');
  updateNotifDot();
}

function acceptReq(id) {
  const r = requests.find(x=>x.id===id);
  if(r) r.status='accepted';
  const el = document.getElementById('rc-'+id);
  if(el) el.innerHTML=`<div style="font-size:13px;color:var(--green-text);padding:6px 0;width:100%;font-weight:500">Matched with ${r.name}! Contact revealed on your matches page.</div>`;
  updateNotifDot();
  showToast("It's a mutual match!");
}
function rejectReq(id) {
  const r = requests.find(x=>x.id===id);
  if(r) r.status='rejected';
  renderRequests();
}
function updateNotifDot() {
  const n = requests.filter(r=>r.status==='pending').length;
  document.getElementById('notif-dot').style.display = n>0?'block':'none';
}

// ── ADMIN ──
function showAdminPanel(id, el) {
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('ap-'+id).classList.add('active');
  if(el) el.classList.add('active');
  if(id==='users') renderAdminUsers(adminUsers);
  if(id==='pairs') renderPairs();
  if(id==='logs') renderLog('full-log',logs);
}

function renderAdminUsers(list) {
  document.getElementById('user-tbody').innerHTML = list.map((u,i)=>{
    const bg=avatarBg[i%6],tc=avatarText[i%6];
    const init=u.name.split(' ').map(x=>x[0]).join('');
    return `<tr>
      <td><span class="avatar-sm" style="background:${bg};color:${tc}">${init}</span>${u.name}</td>
      <td>${u.city}</td><td>${u.budget}</td><td>${u.personality}</td>
      <td><span class="sbadge ${u.status==='Matched'?'s-matched':u.status==='Pending'?'s-pending':'s-new'}">${u.status}</span></td>
      <td style="display:flex;gap:6px"><button class="btn btn-sm" onclick="showToast('Viewing ${u.name}')">View</button><button class="btn btn-sm btn-danger" onclick="showToast('User removed')">Remove</button></td>
    </tr>`;
  }).join('');
}

function filterUsers() {
  const q=document.getElementById('user-search').value.toLowerCase();
  const city=document.getElementById('user-city').value;
  const status=document.getElementById('user-status').value;
  renderAdminUsers(adminUsers.filter(u=>
    (!q||u.name.toLowerCase().includes(q))&&(!city||u.city===city)&&(!status||u.status===status)
  ));
}

function renderPairs() {
  document.getElementById('pairs-list').innerHTML = pairs.map((p,i)=>`
    <div class="match-pair">
      <span class="avatar-sm" style="background:${avatarBg[i%6]};color:${avatarText[i%6]};width:28px;height:28px;font-size:11px">${p.u1.split(' ').map(x=>x[0]).join('')}</span>
      <span class="avatar-sm" style="background:${avatarBg[(i+2)%6]};color:${avatarText[(i+2)%6]};width:28px;height:28px;font-size:11px">${p.u2.split(' ').map(x=>x[0]).join('')}</span>
      <div class="pair-names">${p.u1} &amp; ${p.u2}</div>
      <div class="pair-bar-wrap"><div class="pair-bar" style="width:${p.score}%"></div></div>
      <div class="pair-score">${p.score}%</div>
      <div style="width:80px;text-align:right"><span class="sbadge ${p.status==='mutual'?'s-matched':p.status==='connected'?'s-mutual':'s-pending'}">${p.status}</span></div>
      <button class="btn btn-sm" onclick="showToast('Viewing pair details')">Details</button>
    </div>`).join('');
}

function renderLog(elId, data) {
  document.getElementById(elId).innerHTML = data.map(l=>`
    <div class="log-item">
      <span class="log-time">${l.time}</span>
      <span class="log-msg">${l.msg}</span>
      <span class="log-type ${l.type==='match'?'log-match':l.type==='user'?'log-user':'log-system'}">${l.type}</span>
    </div>`).join('');
}

function runMatching() {
  const box=document.getElementById('matching-result');
  const bar=document.getElementById('match-progress');
  const title=document.getElementById('match-result-title');
  const body=document.getElementById('match-result-body');
  box.style.display='block'; bar.style.width='0%';
  title.textContent='Matching in progress...';
  const steps=['Reading profiles...','Filtering by city...','Scoring compatibility...','Grouping pairs above threshold...','Saving results...'];
  let p=0;
  const iv=setInterval(()=>{
    p+=20; bar.style.width=p+'%';
    body.textContent=steps[Math.floor(p/20)-1]||'';
    if(p>=100){
      clearInterval(iv);
      title.textContent='Matching complete';
      body.innerHTML='<span style="color:var(--green-text);font-weight:600">14 new pairs found</span> above threshold.';
      showToast('Matching done — 14 pairs found!');
    }
  },450);
}

// ── TOAST ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

let logoClickTimer = null;

// ── AVATAR ──
let selectedAvatarColor = '#7F77DD';
let selectedAvatarBg = '#EEEDFE';
let selectedAvatarPhoto = '';

function updateInitials(name) {
  const initials = name.split(' ').map(x=>x[0]).filter(Boolean).join('').substring(0,2).toUpperCase() || '?';
  document.getElementById('avatar-initials').textContent = initials;
  if(!selectedAvatarPhoto) {
    document.getElementById('avatar-preview').style.background = selectedAvatarBg;
    document.getElementById('avatar-preview').style.color = selectedAvatarColor;
  }
}

function pickColor(color, bg) {
  selectedAvatarColor = color;
  selectedAvatarBg = bg;
  selectedAvatarPhoto = '';
  document.getElementById('avatar-preview').style.background = bg;
  document.getElementById('avatar-preview').style.color = color;
  document.getElementById('avatar-initials').style.display = 'block';
  document.getElementById('avatar-google-img').style.display = 'none';
  document.querySelectorAll('#avatar-colors div').forEach(d => d.style.borderColor = 'transparent');
  event.target.style.borderColor = '#1a1a1a';
}

function useGooglePhoto() {
  const user = window._currentUser ? window._currentUser() : null;
  if(user && user.photoURL) {
    selectedAvatarPhoto = user.photoURL;
    document.getElementById('avatar-google-img').src = user.photoURL;
    document.getElementById('avatar-google-img').style.display = 'block';
    document.getElementById('avatar-initials').style.display = 'none';
    showToast('Google photo set!');
  } else {
    showToast('No Google photo found — pick a colour instead.');
  }
}

// ── PAYMENT ──
function previewProfilePic(input) {
  if(input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('profile-pic-preview').src = e.target.result;
      document.getElementById('profile-pic-preview').style.display = 'block';
      document.getElementById('profile-pic-icon').style.display = 'none';
      window._profilePicData = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }
}




let selectedRating = 0;
let ratingAnswers = {};

function rateStar(n) {
  selectedRating = n;
  for (let i = 1; i <= 5; i++) {
    const star = document.getElementById('star-'+i);
    const svg = star.querySelector('svg polygon, star svg polygon');
    star.querySelector('svg').style.fill = i <= n ? '#7F77DD' : 'none';
  }
  showToast(n >= 4 ? 'Glad you loved it! 💜' : n >= 3 ? 'Thanks for your honest feedback!' : 'Sorry to hear that — your feedback helps us improve!');
}

function rateChip(el, group) {
  el.closest('.rating-chips').querySelectorAll('.rating-chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  ratingAnswers[group] = el.textContent;
}

function submitRating() {
  if (!selectedRating) { showToast('Please select a star rating!'); return; }
  const feedback = {
    stars: selectedRating,
    answers: ratingAnswers,
    comment: document.getElementById('rating-feedback').value,
    submittedAt: new Date().toISOString()
  };
  // Save to Firebase if available
  if (window._db && window._currentUser && window._currentUser()) {
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({ collection, addDoc }) => {
      addDoc(collection(window._db, 'ratings'), {
        uid: window._currentUser().uid,
        ...feedback
      });
    });
  }
  showToast('Thank you for your feedback! 💜');
  setTimeout(() => showPage('matches'), 1500);
}

// ── CHECK RATING PROMPT (7 days after connect) ──
function checkRatingPrompt() {
  const connectDate = localStorage.getItem('homiefy_connect_date');
  if (connectDate) {
    const days = (Date.now() - parseInt(connectDate)) / (1000 * 60 * 60 * 24);
    if (days >= 7 && !localStorage.getItem('homiefy_rated')) {
      setTimeout(() => {
        showPage('rating');
        showToast('How did things go with your roommate match?');
      }, 2000);
    }
  }
}

showPage('landing');
document.getElementById('auth-section').style.display = 'flex';
document.getElementById('main-nav').style.display = 'none';
checkRatingPrompt();
